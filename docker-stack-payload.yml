version: '3.8'

# Payload CMS Stack for Docker Swarm
# 3 replicas with Traefik routing via traefik_proxy_v2 network
# Canonical public URL: https://cms.xencolabs.com (publish.xencolabs.com = legacy alias in Traefik)
# Cert resolver: cf (Cloudflare)

services:
  payload:
    image: registry.xencolabs.com/payload-swarm:latest
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # NEVER deploy this stack without DATABASE_URI in the shell env (use ./scripts/deploy.sh or ./scripts/stack-deploy-payload.sh)
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: https://cms.xencolabs.com
      NEXT_PUBLIC_PAYLOAD_URL: https://cms.xencolabs.com
      # R2 Storage
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      # Meilisearch
      MEILISEARCH_HOST: ${MEILISEARCH_HOST}
      MEILISEARCH_KEY: ${MEILISEARCH_KEY}
      # SEO Scorer
      SEO_SCORER_URL: ${SEO_SCORER_URL}
      SEO_SCORER_API_KEY: ${SEO_SCORER_API_KEY}
      SEO_SCORER_HEADER: X-API-Key
      # Image Gen
      IMAGE_GEN_API_URL: ${IMAGE_GEN_API_URL}
      IMAGE_GEN_API_KEY: ${IMAGE_GEN_API_KEY}
      # Support API Keys
      REINDEX_API_KEY: ${REINDEX_API_KEY}
      SUPPORT_SLACK_WEBHOOK_URL: ${SUPPORT_SLACK_WEBHOOK_URL}
      SUPPORT_HEALTH_TOKEN: ${SUPPORT_HEALTH_TOKEN}
      PAYLOAD_ADMIN_API_KEY: ${PAYLOAD_ADMIN_API_KEY}
      SUPPORT_RATE_LIMIT_ENABLED: "true"
      SUPPORT_TRIAGE_TOKEN: ${SUPPORT_TRIAGE_TOKEN}
      SUPPORT_AUTOFIX_TOKEN: ${SUPPORT_AUTOFIX_TOKEN}
      SUPPORT_ADMIN_TOKEN: ${SUPPORT_ADMIN_TOKEN}
      INTERNAL_LINKER_API_KEY: ${INTERNAL_LINKER_API_KEY}
      INTERNAL_LINKER_API_KEY_FILE: /run/secrets/internal_linker_api_key
      # Redis Caching Configuration
      # Native Redis VM Sentinel Cluster (not Docker) for HA session/auth
      # Sentinel nodes: xenco5 (10.8.8.17), xenco4 (10.8.8.16), xenco3 (10.8.8.15)
      REDIS_SENTINEL_HOSTS: 10.8.8.17:26379,10.8.8.16:26379,10.8.8.15:26379
      REDIS_SENTINEL_MASTER: mymaster
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Dedicated local cache for query/page caching (Docker Redis)
      REDIS_CACHE_URL: redis://payload-redis-cache_payload-cache:6379
      REDIS_CACHE_TTL: "3600"
      # Enable caching
      CACHE_ENABLED: "true"
    networks:
      - traefik_proxy_v2
      - payload-internal
      - redis-sentinel
    secrets:
      - payload_secret
      - internal_linker_api_key
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_proxy_v2"
        # HTTP Router
        # Add all CMS domains here - separate with || for OR
        # All CMS domains - derived from sites_domains table
        - "traefik.http.routers.payload-swarm.rule=Host(`cms.xencolabs.com`) || Host(`publish.xencolabs.com`) || Host(`cms.blogcraft.app`) || Host(`cms.devmaestro.io`) || Host(`cms.diabetescompass.com`) || Host(`cms.fiberinsider.com`) || Host(`cms.fightclubtech.com`) || Host(`cms.fightmybank.com`) || Host(`cms.homebeautyspa.com`) || Host(`cms.imagecrafter.app`) || Host(`cms.isthisagoodjob.com`) || Host(`cms.landingcraft.app`) || Host(`cms.landlordhell.com`) || Host(`cms.legalcraft.app`) || Host(`cms.lexiexplains.com`) || Host(`cms.mcpforge.org`) || Host(`cms.nexusguard.dev`) || Host(`cms.promptmarketer.app`) || Host(`cms.renterandlandlord.com`) || Host(`cms.resumecoach.me`) || Host(`cms.snackabletiktok.com`) || Host(`cms.sonomagrovesuites.com`) || Host(`cms.tinatortoise.com`) || Host(`cms.winecountrycorner.com`)"
        - "traefik.http.routers.payload-swarm.entrypoints=websecure"
        - "traefik.http.routers.payload-swarm.tls=true"
        - "traefik.http.routers.payload-swarm.tls.certresolver=cf"
        # Service
        - "traefik.http.services.payload-swarm.loadbalancer.server.port=3000"
        - "traefik.http.services.payload-swarm.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.payload-swarm.loadbalancer.sticky.cookie.name=payload_swarm_sticky"
        - "traefik.http.services.payload-swarm.loadbalancer.sticky.cookie.httpOnly=true"
        - "traefik.http.services.payload-swarm.loadbalancer.sticky.cookie.secure=true"
        # Health check
        - "traefik.http.services.payload-swarm.loadbalancer.healthcheck.path=/"
        - "traefik.http.services.payload-swarm.loadbalancer.healthcheck.interval=30s"
        - "traefik.http.services.payload-swarm.loadbalancer.healthcheck.timeout=10s"

networks:
  traefik_proxy_v2:
    external: true
  payload-internal:
    external: true
    name: payload-postgres_payload-internal
  # Redis Sentinel network - provides HAProxy bridge fallback
  # Primary connection uses direct VM IPs for Sentinel-aware HA
  redis-sentinel:
    external: true
    name: redis-sentinel_redis-network

secrets:
  payload_secret:
    external: true
  internal_linker_api_key:
    external: true
