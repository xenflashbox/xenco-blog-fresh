[databases]
openbrain = host=payload-postgres_postgres port=5432 dbname=openbrain
payload = host=payload-postgres_postgres port=5432 dbname=payload
devmaestro = host=payload-postgres_postgres port=5432 dbname=devmaestro
mcpforge = host=payload-postgres_postgres port=5432 dbname=mcpforge
launchcraft = host=payload-postgres_postgres port=5432 dbname=launchcraft
litellm = host=payload-postgres_postgres port=5432 dbname=litellm
fightclub = host=payload-postgres_postgres port=5432 dbname=fightclub

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Ignore startup parameters that JDBC drivers send
ignore_startup_parameters = extra_float_digits

; Pool settings
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
max_db_connections = 100

; SSL/TLS Settings (client-side)
client_tls_sslmode = prefer
client_tls_cert_file = /etc/pgbouncer/server.crt
client_tls_key_file = /etc/pgbouncer/server.key

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Timeouts
server_connect_timeout = 15
server_login_retry = 3
query_timeout = 120
client_idle_timeout = 0

; Admin
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats
