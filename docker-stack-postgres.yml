version: '3.8'

# PostgreSQL Stack for Payload CMS
# Single replica with local persistent storage on manager node

services:
  postgres:
    image: pgvector/pgvector:pg17
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: payload
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - payload-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == xenco3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  payload-internal:
    driver: overlay
    attachable: true

volumes:
  postgres-data:
    driver: local
